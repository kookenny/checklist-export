<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Extractor</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <h1>Checklist Extractor</h1>
            <p>Extract full checklist content from Caseware Cloud primary author templates.</p>
        </header>

        <main class="card">
            <h2>Generate Report</h2>

            <div class="form-group">
                <label for="cwUrl">Caseware URL</label>
                <input type="text" id="cwUrl"
                       placeholder="https://ca.cwcloudpartner.com/ca-develop/e/eng/.../index.jsp#/efinancials/...">
                <div class="helper-text" id="parsedInfo">
                    Paste a Caseware engagement URL to extract all checklists, or a document URL for a single checklist
                </div>
            </div>

            <div class="form-group">
                <label for="templateName">Report Name <span style="font-weight:400; color:rgba(0,0,0,0.60)">(optional)</span></label>
                <input type="text" id="templateName" placeholder="e.g. OnPoint Audit 2024">
            </div>

            <div class="actions">
                <button id="generateBtn" class="btn-primary">Extract Checklists</button>
            </div>

            <div id="status" class="status-area" hidden>
                <div class="spinner"></div>
                <span>Extracting checklists&hellip; this may take a few minutes for large templates</span>
            </div>

            <div id="error" class="error-message" hidden></div>
            <div id="success" class="success-message" hidden></div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
